name: GitHub Follower Automation

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - follow_back
          - cleanup
          - stats_only
      discovery:
        description: 'Run discovery script?'
        required: true
        default: 'false'
        type: boolean

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run follower automation
        env:
          GITHUB_TOKEN: ${{ secrets.FOLLOW_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          AUTOMATION_ACTION: ${{ github.event.inputs.action || 'both' }}
          DRY_RUN: 'false'
        run: python follower_automation.py

      - name: Run discovery (if requested)
        if: github.event.inputs.discovery == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.FOLLOW_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          DRY_RUN: 'false'
          DISCOVERY_STRATEGY: 'trending'
        run: python discovery.py
