# .github/workflows/github-follower-automation.yml
name: GitHub Follower Automation

on:
  schedule:
    # Ejecutar cada día a las 8:00 AM UTC
    - cron: '0 8 * * *'
  
  # Permitir ejecución manual
  workflow_dispatch:
    inputs:
      action:
        description: 'Qué acción realizar'
        required: true
        default: 'both'
        type: choice
        options:
        - both
        - follow_back
        - cleanup
        - stats_only
        - discovery
      dry_run:
        description: 'Modo Dry Run (solo simulación)'
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      discovery_strategy:
        description: 'Estrategia de descubrimiento (solo si action=discovery)'
        required: false
        default: 'search'
        type: choice
        options:
        - search
        - stargazers
        - followers
      discovery_target:
        description: 'Target de descubrimiento (query search, repo, o usuario)'
        required: false
        default: 'follow back'

jobs:
  automation:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout repository
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi
    
    - name: 🤖 Run GitHub follower automation
      if: github.event_name == 'schedule' || github.event.inputs.action == 'both' || github.event.inputs.action == 'follow_back' || github.event.inputs.action == 'cleanup' || github.event.inputs.action == 'stats_only'
      run: python follower_automation.py
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.repository_owner }}
        MAX_UNFOLLOWS_PER_RUN: ${{ vars.MAX_UNFOLLOWS_PER_RUN || '20' }}
        MAX_FOLLOWS_PER_RUN: ${{ vars.MAX_FOLLOWS_PER_RUN || '15' }}
        DELAY_SECONDS: ${{ vars.DELAY_SECONDS || '5' }}
        AUTOMATION_ACTION: ${{ github.event.inputs.action || 'both' }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    - name: 🔎 Run GitHub Discovery
      if: github.event_name == 'schedule' || github.event.inputs.action == 'both' || github.event.inputs.action == 'discovery'
      run: python discovery.py
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.repository_owner }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        DISCOVERY_STRATEGY: ${{ github.event.inputs.discovery_strategy || 'search' }}
        DISCOVERY_TARGET: ${{ github.event.inputs.discovery_target || 'follow back' }}
        MAX_DISCOVERY_FOLLOWS: ${{ vars.MAX_DISCOVERY_FOLLOWS || '10' }}
        MIN_FOLLOW_RATIO: ${{ vars.MIN_FOLLOW_RATIO || '0.5' }}

    - name: 📊 Summary
      if: always()
      run: |
        echo "## 🤖 GitHub Automation Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Usuario:** @${{ github.repository_owner }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Acción:** ${{ github.event_name == 'schedule' && 'Full Daily Sync' || github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.action }}" == "discovery" || "${{ github.event.inputs.action }}" == "both" ]]; then
          echo "- **Estrategia Descubrimiento:** ${{ github.event.inputs.discovery_strategy || 'search' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Descubrimiento:** ${{ github.event.inputs.discovery_target || 'follow back' }}" >> $GITHUB_STEP_SUMMARY
        fi
        echo "- **Dry Run:** ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Fecha:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **Estado:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
